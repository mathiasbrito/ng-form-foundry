@if (formGroup && nodeMap) {
  <div class="map-node">
    @for (key of entryKeys; track key) {
      <div class="map-entry">
        <mat-form-field class="key-field" [appearance]="editable ? 'fill' : 'outline'">
          <mat-label>{{ nodeMap.keyLabel ?? 'Key' }}</mat-label>
          <!-- On a rejected rename (empty, duplicate, keyPattern violation) the
               input snaps back to the committed key, so the display never
               disagrees with the key getRawValue() will emit. -->
          <input
            matInput
            #keyInput
            [readonly]="!editable"
            [value]="key"
            (change)="renameEntry(key, keyInput.value); keyInput.value = key"
          >
        </mat-form-field>

        <!-- Index access, not .get(): entry keys are arbitrary runtime data and
             .get() would split a key like 'web.example.com' into a dotted path. -->
        <div class="value-field">
          @if (nodeMap.value.kind === 'leaf') {
            <nff-leaf-renderer
              [leaf_]="valueLeaf"
              [control]="asFormControl(formGroup.controls[key])"
              [editable]="editable"
            />
          } @else if (nodeMap.value.kind === 'nodeGroup') {
            <nff-dynamic-recursive-form
              [schema]="valueGroup"
              [formGroup]="asFormGroup(formGroup.controls[key])"
              [editable]="editable"
            />
          }
        </div>

        @if (editable && !atMin) {
          <button class="remove-button small-icon-button" matIconButton [matTooltip]="'Remove ' + key + ' entry'" [attr.aria-label]="'Remove ' + key + ' entry'" (click)="removeEntry(key)">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </div>
    }
    @if (editable && !atMax) {
      <button class="add-button small-icon-button" matIconButton [matTooltip]="'Add ' + (nodeMap.label ?? nodeMap.name) + ' entry'" [attr.aria-label]="'Add ' + (nodeMap.label ?? nodeMap.name) + ' entry'" (click)="addEntry()">
        <mat-icon>add</mat-icon>
      </button>
    }
  </div>
}
