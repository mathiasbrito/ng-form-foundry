@if (formArray && leaf_) {
    @for (control of formArray.controls; track $index) {
      <div class="field-item">
        <nff-anon-leaf-renderer
          [AnonLeaf]="leaf_" [control]="control"
          [removable]="minItems == null || formArray.length > minItems"
          [index]="$index"
          [editable]="editable"
          [label]="leaf_.label ?? leaf_.name"
          (remove)="removeItem($index)"
        />
        @if (editable) {
          <div class="actions">
            @if (formArray.length > minItems) {
              <button class="remove-button small-icon-button" matIconButton [attr.aria-label]="'Remove ' + (leaf_.label ?? leaf_.name) + ' item'" (click)="removeItem($index)">
                <mat-icon matPrefix>delete</mat-icon>
              </button>
            }
            @if ($last) {
              <button class="add-button small-icon-button" matIconButton [attr.aria-label]="'Add ' + (leaf_.label ?? leaf_.name) + ' item'" (click)="addItem()">
                <mat-icon matPrefix>add</mat-icon>
              </button>
            }
            <div class="actions-spacer"></div>
          </div>
        }
      </div>
    }
}
