@if (formArray && leaf_) {
    @for (control of formArray.controls; track $index) {
      <div class="field-item">
        <nff-anon-leaf-renderer
          [AnonLeaf]="leaf_" [control]="control"
          [removable]="formArray.length > effectiveMin"
          [index]="$index"
          [editable]="editable"
          [label]="leaf_.label ?? leaf_.name"
          (remove)="removeItem($index)"
        />
        @if (editable) {
          <div class="actions">
            @if (formArray.length > effectiveMin) {
              <button class="remove-button small-icon-button" matIconButton [matTooltip]="'Remove ' + (leaf_.label ?? leaf_.name) + ' item'" [attr.aria-label]="'Remove ' + (leaf_.label ?? leaf_.name) + ' item'" (click)="removeItem($index)">
                <mat-icon matPrefix>delete</mat-icon>
              </button>
            }
            @if ($last && canAdd) {
              <button class="add-button small-icon-button" matIconButton [matTooltip]="'Add ' + (leaf_.label ?? leaf_.name) + ' item'" [attr.aria-label]="'Add ' + (leaf_.label ?? leaf_.name) + ' item'" (click)="addItem()">
                <mat-icon matPrefix>add</mat-icon>
              </button>
            }
            <div class="actions-spacer"></div>
          </div>
        }
      </div>
    }
    @if (editable && formArray.length === 0 && canAdd) {
      <!-- A required (non-presence) list can be present-but-empty; this labeled
           affordance adds the first entry so an empty list is not a dead end
           (mirrors the node-group list's "Add … #1"). A presence list never
           renders empty here — its first entry appears on materialize, and
           removing the last entry de-materializes it. -->
      <button
        matButton="outlined"
        class="empty-add-button"
        [attr.aria-label]="'Add ' + (leaf_.label ?? leaf_.name) + ' item'"
        (click)="addItem()"
      >
        <mat-icon>add</mat-icon> Add {{ leaf_.label ?? leaf_.name }} item
      </button>
    }
}
