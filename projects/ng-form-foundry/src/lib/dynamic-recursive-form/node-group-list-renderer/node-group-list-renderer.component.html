@if(formArray && nodeGroupList) {
  <div class="fields">
    @for (group of formArray.controls; track $index) {
      <nff-dynamic-recursive-form
        [schema]="nodeGroupList.type"
        [formGroup]="asFormGroup(group)"
        [title]="`${nodeGroupList.type.label ?? nodeGroupList.type.name} ${'#' + ($index + 1)}`"
        [index]="$index"
        [removable]=true
        (remove)="removeItem($index)"
      />
      @if($last) {
        @if (editable) {
          <button class="add-button" matButton (click)="addItem()"><mat-icon matPrefix>add</mat-icon>add {{nodeGroupList.label ?? nodeGroupList.name}}</button>
        }
      }
    }
  </div>
}
