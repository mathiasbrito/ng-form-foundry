@if(formArray && nodeGroupList) {
  <div class="fields">
    @for (group of formArray.controls; track $index) {
      <nff-dynamic-recursive-form
        [schema]="nodeGroupList.type"
        [formGroup]="asFormGroup(group)"
        [title]="`${nodeGroupList.type.label ?? nodeGroupList.type.name} ${'#' + ($index + 1)}`"
        [index]="$index"
        [removable]="formArray.length > minItems && formArray.length < maxItems"
        (remove)="removeItem($index)"
        [editable]="editable"
      />
      @if($last && formArray.length < maxItems) {
          <button matIconButton class="small-icon-button" matTooltip=" + Add new {{ nodeGroupList.type.label ?? nodeGroupList.type.name  }}" (click)="addItem()"><mat-icon>add</mat-icon></button>
      }
    }
  </div>
}
