name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test library
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx ng build ng-form-foundry

      - name: Test library
        run: npx ng test ng-form-foundry --watch=false --browsers=ChromeHeadless --no-progress

      - name: Pack (verify publishable tarball)
        run: npm pack ./dist/ng-form-foundry

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ng-form-foundry-package
          path: ng-form-foundry-*.tgz

  transformers:
    name: Build & test transformers
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/ng-form-foundry-transformers
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/ng-form-foundry-transformers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack (verify publishable tarball)
        run: npm pack

  docs:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs (warnings fail the build)
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: docs/_build/html

      # Publish to Read the Docs by asking it to rebuild the `latest` version
      # (which tracks the default branch). Only on pushes to main, never on PRs.
      # Best-effort: a missing token or an RTD error (e.g. project not imported
      # yet) warns but never fails CI — the docs artifact above is the source of
      # truth for the build itself.
      - name: Trigger Read the Docs build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RTD_TOKEN: ${{ secrets.READTHEDOCS_TOKEN }}
        run: |
          if [ -z "${RTD_TOKEN}" ]; then
            echo "READTHEDOCS_TOKEN not set; skipping Read the Docs trigger."
            exit 0
          fi
          status=$(curl -sS -o /tmp/rtd.out -w '%{http_code}' -X POST \
            -H "Authorization: Token ${RTD_TOKEN}" \
            "https://readthedocs.org/api/v3/projects/ng-form-foundry/versions/latest/builds/" || true)
          status=${status:-000}
          echo "Read the Docs responded HTTP ${status}"
          cat /tmp/rtd.out 2>/dev/null || true
          echo
          case "${status}" in
            2*) echo "Read the Docs build triggered." ;;
            *) echo "::warning::Read the Docs build not triggered (HTTP ${status}). Import the project on readthedocs.org (slug 'ng-form-foundry') and check the token." ;;
          esac
