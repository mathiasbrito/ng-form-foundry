name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test library
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npx ng build ng-form-foundry

      - name: Test library
        run: npx ng test ng-form-foundry --watch=false --browsers=ChromeHeadless --no-progress

      - name: Pack (verify publishable tarball)
        run: npm pack ./dist/ng-form-foundry

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ng-form-foundry-package
          path: ng-form-foundry-*.tgz

  yang-adapter:
    name: Build & test YANG adapter
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: packages/yang-form-foundry
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/yang-form-foundry/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack (verify publishable tarball)
        run: npm pack

  docs:
    name: Build documentation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs (warnings fail the build)
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html

      # Publish to Read the Docs by asking it to rebuild the `latest` version
      # (which tracks the default branch). Only on pushes to main, never on PRs.
      # No-op if the token secret is absent, so CI stays green before it is set.
      - name: Trigger Read the Docs build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          RTD_TOKEN: ${{ secrets.READTHEDOCS_TOKEN }}
        run: |
          if [ -z "${RTD_TOKEN}" ]; then
            echo "READTHEDOCS_TOKEN not set; skipping Read the Docs trigger."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: Token ${RTD_TOKEN}" \
            "https://readthedocs.org/api/v3/projects/ng-form-foundry/versions/latest/builds/"
